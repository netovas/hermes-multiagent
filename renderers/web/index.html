<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ZethPhoenix Virtual Office 🦅🔥</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
</head>
<body>
  <header>
    <h1>🦅🔥 ZethPhoenix Virtual Office</h1>
    <div id="project-info">No active project</div>
    <div id="connection-status">⚪ Disconnected</div>
  </header>

  <main id="office-floor">
    <!-- Agent cards injected dynamically by app.js -->
  </main>

  <aside id="event-log">
    <h3>📜 Live Event Log</h3>
    <ul id="log-list"></ul>
  </aside>

  <div id="phoenix-overlay" class="hidden">
    <div id="phoenix-anim"></div>
    <p>ZethPhoenix rises from the ashes...</p>
  </div>

  <script src="app.js"></script>
</body>
</html>
